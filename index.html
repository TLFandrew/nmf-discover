    function keywordFallback(q) {
      const text = q.toLowerCase();
      const expansions = {
        thirsty: ["drinks", "boba", "bubble tea", "matcha", "tea", "chai", "taro"],
        drink: ["drinks", "boba", "bubble tea", "matcha", "tea", "chai"],
        hungry: ["street food", "rice bowls", "noodles", "comfort food", "bbq"],
        hot: ["shaved ice", "dessert", "boba", "drinks", "matcha"],
        cold: ["chai", "matcha", "grilled", "noodles", "comfort food"],
        sweet: ["dessert", "sweet", "boba", "shaved ice", "mochi", "taro"],
        spicy: ["spicy"],
        tired: ["lounge", "chill", "seating", "relaxation"],
        stressed: ["lounge", "chill", "relaxation", "craft", "meditative"],
        relax: ["lounge", "chill", "relaxation", "ambient"],
        love: ["photos", "lantern", "souvenir", "cultural"],
        sad: ["comfort food", "sweet", "dessert", "lounge", "chill"],
        bored: ["game", "interactive", "challenge", "craft", "dance"],
        lonely: ["lounge", "social", "chill", "collaborative"],
        happy: ["dance", "k-pop", "dj", "high energy"],
        excited: ["dance", "k-pop", "dj", "high energy"],
        dance: ["dance", "k-pop", "dj", "high energy"],
        kids: ["kids", "family", "all ages", "game", "interactive"],
        family: ["family", "kids", "all ages", "interactive"],
        gift: ["prints", "stickers", "handmade", "jewelry", "accessories", "apparel"],
        vegan: ["vegan options", "vegetarian"],
        vegetarian: ["vegetarian", "vegan options"],
      };
      const STOPWORDS = new Set([
        "im", "the", "and", "for", "are", "you", "want", "like", "some", "something",
        "looking", "feel", "feeling", "really", "just", "need", "got", "any", "what",
        "whats", "where", "have", "this", "that", "give", "show", "find", "with",
      ]);

      const words = text.split(/[^a-z]+/).filter(w => w.length >= 3 && !STOPWORDS.has(w));
      const terms = new Set(words);
      let matchedState = null;
      words.forEach(w => {
        const stem = w.replace(/(ing|ed|s)$/, "");
        Object.keys(expansions).forEach(key => {
          if (w.includes(key) || key.includes(stem)) {
            expansions[key].forEach(t => terms.add(t));
            if (STATE_MESSAGES[key] && !matchedState) matchedState = key;
          }
        });
      });

      const scored = VENDORS.map(v => {
        const tagStr = (v.tags.join(" ") + " " + v.subcategory).toLowerCase();
        const descStr = `${v.name} ${v.description} ${v.products || ""}`.toLowerCase();
        const tagWords = new Set(tagStr.split(/[^a-z]+/).filter(Boolean));
        const descWords = new Set(descStr.split(/[^a-z]+/).filter(Boolean));
        let score = 0;
        terms.forEach(t => {
          if (t.includes(" ")) {
            if (tagStr.includes(t)) score += 2;
            else if (descStr.includes(t)) score += 1;
          } else {
            if (tagWords.has(t)) score += 2;
            else if (descWords.has(t)) score += 1;
          }
        });
        return { v, score };
      }).filter(x => x.score > 0)
        .sort((a, b) => b.score - a.score)
        .slice(0, 6)
        .map(x => x.v);

      return { vendors: scored, stateKey: matchedState };
    }

    function localized(vendor, lang) {
      const loc = vendor.i18n && vendor.i18n[lang];
      return {
        subcategory: (loc && loc.subcategory) || vendor.subcategory,
        description: (loc && loc.description) || vendor.description,
      };
    }

    function VendorCard({ vendor, freeLabel, lang, onOpen, inPlan, onTogglePlan, addLabel, inPlanLabel }) {
      const colors = CATEGORY_COLORS[vendor.category];
      const { subcategory, description } = localized(vendor, lang);
      return (
        <div style={{ background: "#1e1e30", borderRadius: 12, padding: 16, borderLeft: `3px solid ${colors.border}`, marginBottom: 12 }}>

                <div style={{ fontSize: 17, fontWeight: 700, color: "#f0ebe3" }}>{vendor.name}</div>
              </div>
              {vendor.priceRange && vendor.priceRange !== "Free" && (
                <span style={{ fontSize: 13, color: "#f0ebe3", opacity: 0.6, fontWeight: 500 }}>{vendor.priceRange}</span>

              {vendor.priceRange === "Free" && (

    function LanguageToggle({ lang, onSelect }) {
      const [open, setOpen] = useState(false);
      const current = LANGS.find(l => l.code === lang) || LANGS[0];
      return (
        <div style={{ position: "relative", display: "flex", justifyContent: "flex-end", paddingTop: 16 }}>
          <button onClick={() => setOpen(o => !o)} style={{ display: "flex", alignItems: "center", gap: 6, padding: "6px 12px", borderRadius: 20, border: "1px solid #333350", background: "#1e1e30", color: "#f0ebe3", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
            <span>🌐</span><span>{current.label}</span><span style={{ fontSize: 10, opacity: 0.6 }}>▾</span>
          </button>
          {open && (
            <React.Fragment>
              <div onClick={() => setOpen(false)} style={{ position: "fixed", inset: 0, zIndex: 10 }} />
              <div style={{ position: "absolute", top: "100%", right: 0, marginTop: 6, background: "#1e1e30", border: "1px solid #333350", borderRadius: 12, padding: 6, zIndex: 11, minWidth: 150, boxShadow: "0 8px 24px rgba(0,0,0,0.4)" }}>

                  return (
                    <button key={l.code} onClick={() => { onSelect(l.code); setOpen(false); }} style={{ display: "block", width: "100%", textAlign: "left", padding: "9px 12px", borderRadius: 8, border: "none", background: isSel ? "#ff6b35" : "transparent", color: isSel ? "#fff" : "#f0ebe3", fontSize: 14, fontWeight: isSel ? 600 : 500, cursor: "pointer" }}>

                })}
              </div>
            </React.Fragment>
          )}
        </div>
      );
    }

    // Placeholder mahjong tile faces. Final art to be designed by TLF Creative.
    // suit -> motif + colour; honours/bonus carry no rank number.
    function TileFace({ suit, rank, size = 44, owned = true, highlight = false, mult = null }) {
      const cfg = ({
        circle: { color: "#ff6b35", kind: "circle" },
        bamboo: { color: "#9b59b6", kind: "bamboo" },
        char:   { color: "#c2974a", kind: "text", ch: "\u842C" },
        wind:   { color: "#e74c8b", kind: "text", ch: "\u6771" },
        dragon: { color: "#2ecc71", kind: "text", ch: "\u4E2D" },
        flower: { color: "#e74c3c", kind: "flower" },
        season: { color: "#3498db", kind: "sun" },
      })[suit] || { color: "#888", kind: "circle" };
      const w = size, h = Math.round(size * 1.32), r = Math.round(size * 0.18);
      if (!owned) {
        return (
          <div style={{ width: w, height: h, borderRadius: r, border: "2px dashed #3a3a55",
            display: "flex", alignItems: "center", justifyContent: "center",
            color: "#3a3a55", fontSize: size * 0.46, fontWeight: 700, background: "transparent" }}>?</div>
        );
      }
      let motif = null;
      const c = cfg.color;
      if (cfg.kind === "circle") {
        motif = (
          <React.Fragment>
            <circle cx="12" cy="12" r="8.4" fill="none" stroke={c} strokeWidth="1.7" />
            <circle cx="12" cy="12" r="4.5" fill="none" stroke={c} strokeWidth="1.7" />
            <circle cx="12" cy="12" r="1.7" fill={c} />
          </React.Fragment>
        );
      } else if (cfg.kind === "bamboo") {
        motif = (
          <React.Fragment>
            {[5.5, 12, 18.5].map((cx, i) => (
              <rect key={i} x={cx - 1.3} y="4.5" width="2.6" height="15" rx="1.3" fill={c} />
            ))}
            <rect x="3.4" y="11.2" width="17.2" height="1.4" fill="#ece4d2" />
          </React.Fragment>
        );
      } else if (cfg.kind === "text") {
        motif = (
          <text x="12" y="13" textAnchor="middle" dominantBaseline="central"
            fontSize="15" fontWeight="700" fill={c} fontFamily="serif">{cfg.ch}</text>
        );
      } else if (cfg.kind === "flower") {
        motif = (
          <React.Fragment>
            {Array.from({ length: 5 }).map((_, i) => {
              const a = (-90 + i * 72) * Math.PI / 180;
              return <circle key={i} cx={12 + 5.2 * Math.cos(a)} cy={12 + 5.2 * Math.sin(a)} r="3.1" fill={c} />;
            })}
            <circle cx="12" cy="12" r="2.3" fill="#f5f0e6" />
          </React.Fragment>
        );
      } else if (cfg.kind === "sun") {
        motif = (
          <React.Fragment>
            {Array.from({ length: 8 }).map((_, i) => {
              const a = i * Math.PI / 4;
              return <line key={i} x1={12 + 5 * Math.cos(a)} y1={12 + 5 * Math.sin(a)}
                x2={12 + 8.5 * Math.cos(a)} y2={12 + 8.5 * Math.sin(a)}
                stroke={c} strokeWidth="1.6" strokeLinecap="round" />;
            })}
            <circle cx="12" cy="12" r="3.8" fill={c} />
          </React.Fragment>
        );
      }
      return (
        <div style={{ position: "relative", width: w, height: h, borderRadius: r,
          background: "linear-gradient(160deg,#fdfaf2,#ece4d2)", border: "1px solid #cfc6b2",
          boxShadow: highlight ? "0 0 0 2px #ff6b35, 0 3px 6px rgba(0,0,0,0.35)" : "0 2px 5px rgba(0,0,0,0.3)",
          overflow: "hidden", flexShrink: 0 }}>
          <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: "34%",
            background: "linear-gradient(#ffffffcc,#ffffff00)" }} />
          {rank != null && (
            <div style={{ position: "absolute", top: 3, left: 5, fontSize: size * 0.24, fontWeight: 800,
              color: cfg.color, opacity: 0.85, lineHeight: 1 }}>{rank}</div>
          )}
          <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
            <svg viewBox="0 0 24 24" width={size * 0.72} height={size * 0.72}>{motif}</svg>
          </div>
          {mult ? (
            <div style={{ position: "absolute", top: 1, right: 1, height: size * 0.4, minWidth: size * 0.4,
              padding: "0 " + (size * 0.07) + "px", borderRadius: size * 0.2, background: "#ff6b35", color: "#fff",
              fontSize: size * 0.27, fontWeight: 800, lineHeight: 1, display: "flex", alignItems: "center",
              justifyContent: "center", boxShadow: "0 1px 2px rgba(0,0,0,0.4)" }}>{"\u00D7" + mult}</div>
          ) : null}
        </div>
      );
    }

    function NMFDiscover() {
      const [lang, setLang] = useState("en");
      const [tab, setTab] = useState("discover");
      const [showCover, setShowCover] = useState(true);
      const [showAbout, setShowAbout] = useState(false);
      const [query, setQuery] = useState("");
      const [results, setResults] = useState(null);
      const [loading, setLoading] = useState(false);
      const [categoryFilter, setCategoryFilter] = useState("All");
      const [error, setError] = useState(null);
      const [plan, setPlan] = useState([]);
      const [activeListing, setActiveListing] = useState(null);
      const [shareMsg, setShareMsg] = useState("");
      const [showRules, setShowRules] = useState(false);
      const [expandedSuit, setExpandedSuit] = useState(null);
      const [showHeadStart, setShowHeadStart] = useState(true);
      const [claimed, setClaimed] = useState([]);
      const [claimToast, setClaimToast] = useState(null);
      const [showQR, setShowQR] = useState(false);
      const [scanning, setScanning] = useState(false);
      const [scanError, setScanError] = useState(false);
      const videoRef = useRef(null);
      const scanRef = useRef({ stream: null, raf: 0, done: false });
      const claimedRef = useRef([]);
      const inputRef = useRef(null);

      const t = { ...TRANSLATIONS[lang], ...SHELL_STRINGS[lang], ...COVER_STRINGS[lang] };

      // Live collection state, built from tiles claimed by scanning booth QR codes.
      const tilesBySuit = {};
      claimed.forEach(c => { (tilesBySuit[c.suit] = tilesBySuit[c.suit] || []).push(c.rank); });
      const rankCounts = (s) => { const m = {}; (tilesBySuit[s] || []).forEach(r => { m[r] = (m[r] || 0) + 1; }); return m; };

      const PASSPORT_SUITS = [
        { suit: "circle", color: "#ff6b35", label: t.categories.Food },
        { suit: "bamboo", color: "#9b59b6", label: t.categories.Artist },
        { suit: "char",   color: "#c2974a", label: t.legendVendors },
        { suit: "wind",   color: "#e74c8b", label: t.categories.Performance },
        { suit: "dragon", color: "#2ecc71", label: t.categories.Activity },
        { suit: "flower", color: "#e74c3c", label: t.categories.Contest },
        { suit: "season", color: "#3498db", label: t.categories.Film },
      ].map(s => ({ ...s, owned: (tilesBySuit[s.suit] || []).length, total: SUIT_TOTAL[s.suit] }));

      // Runs (3 consecutive ranks) and triplets (3 of a kind) form automatically.
      const PASSPORT_SETS = [];
      PASSPORT_SUITS.forEach(s => {
        const counts = rankCounts(s.suit);
        Object.keys(counts).forEach(r => { if (counts[r] >= 3) PASSPORT_SETS.push({ suit: s.suit, tiles: [+r, +r, +r], kind: "triplet", pts: 20 }); });
        if (s.suit === "circle" || s.suit === "bamboo" || s.suit === "char") {
          for (let r = 1; r <= 7; r++) { if (counts[r] && counts[r + 1] && counts[r + 2]) { PASSPORT_SETS.push({ suit: s.suit, tiles: [r, r + 1, r + 2], kind: "run", pts: 15 }); r += 2; } }
        }
      });
      const setBonus = PASSPORT_SETS.reduce((a, st) => a + st.pts, 0);
      const points = claimed.length * 10 + setBonus;
      const REWARD_TIERS = [100, 250, 500, 1000];
      const nextTier = REWARD_TIERS.find(x => x > points) || (Math.ceil((points + 1) / 500) * 500);
      const rewardPct = Math.min(100, Math.round(points / nextTier * 100));
      const suitGrid = (suit) => {
        const counts = rankCounts(suit);
        const simple = suit === "circle" || suit === "bamboo" || suit === "char";
        return Array.from({ length: SUIT_SIZE[suit] }, (_, i) => ({ rank: simple ? i + 1 : null, owned: !!counts[i + 1] }));
      };
      const PASSPORT_PARTNERS = [
        { name: "The Lunar Foundation", logo: TLF_LOGO, bg: "#1e1e30" },
        { name: "Greater Austin Asian Chamber", logo: GAACC_LOGO, bg: "#ffffff" },
        { name: "City of Cedar Park", logo: CEDARPARK_LOGO, bg: "#ffffff" },
      ];

      // Load a saved plan from a shared URL (?plan=) or this device, once on mount.
      useEffect(() => {
        let ids = [];
        try {
          const p = new URLSearchParams(window.location.search).get("plan");
          if (p) ids = p.split(",").map(Number).filter(n => !isNaN(n));
        } catch (e) {}
        if (ids.length === 0) {
          try {
            const saved = JSON.parse(localStorage.getItem("nmf_plan") || "[]");
            if (Array.isArray(saved)) ids = saved;
          } catch (e) {}
        }
        if (ids.length) setPlan(ids);
      }, []);

      // Persist the plan to this device whenever it changes.
      useEffect(() => {
        try { localStorage.setItem("nmf_plan", JSON.stringify(plan)); } catch (e) {}
      }, [plan]);

      // On mount: load collected tiles, and honor a ?claim= (QR scan) or ?qr= (test screen) link.
      useEffect(() => {
        let saved = [];
        try { const s = JSON.parse(localStorage.getItem("nmf_tiles") || "[]"); if (Array.isArray(s)) saved = s; } catch (e) {}
        let consumed = false, toast = null;
        try {
          const params = new URLSearchParams(window.location.search);
          const c = params.get("claim");
          if (c) {
            const id = Number(c); const tile = TILE_BY_ID[id];
            if (tile) {
              const dup = saved.some(x => x.id === id);
              const entry = { id, suit: tile.suit, rank: tile.rank, name: tile.name };
              if (!dup) saved = [...saved, entry];
              toast = { ...entry, dup };
              consumed = true;
            }
          }
          if (params.get("qr")) { setShowQR(true); setShowCover(false); consumed = true; }
        } catch (e) {}
        setClaimed(saved);
        if (toast) { setClaimToast(toast); setShowCover(false); setTab("passport"); }
        if (consumed) { try { window.history.replaceState({}, "", window.location.pathname); } catch (e) {} }
      }, []);

      // Persist collected tiles to this device.
      useEffect(() => {
        try { localStorage.setItem("nmf_tiles", JSON.stringify(claimed)); } catch (e) {}
      }, [claimed]);

      function resetTiles() { setClaimed([]); try { localStorage.removeItem("nmf_tiles"); } catch (e) {} }

      // Keep a live mirror of claimed tiles for synchronous duplicate checks inside the scan loop.
      useEffect(() => { claimedRef.current = claimed; }, [claimed]);

      // Claim a booth's tile once. A second scan of the same booth just confirms, no duplicate.
      function claimById(id) {
        const tile = TILE_BY_ID[id];
        if (!tile) return;
        const dup = claimedRef.current.some(c => c.id === id);
        const entry = { id, suit: tile.suit, rank: tile.rank, name: tile.name };
        if (!dup) setClaimed(prev => prev.some(c => c.id === id) ? prev : [...prev, entry]);
        setClaimToast({ ...entry, dup });
        setScanning(false);
      }

      // In-app camera scanner: reads booth QR codes in place, so no new browser tabs.
      useEffect(() => {
        if (!scanning) return;
        const st = scanRef.current; st.done = false;
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || !window.jsQR) { setScanError(true); return; }
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        let cancelled = false;
        navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: "environment" } }, audio: false })
          .then(stream => {
            if (cancelled) { stream.getTracks().forEach(t => t.stop()); return; }
            st.stream = stream;
            const v = videoRef.current;
            if (!v) { stream.getTracks().forEach(t => t.stop()); return; }
            v.srcObject = stream;
            v.play().catch(() => {});
            const tick = () => {
              if (cancelled || st.done) return;
              const v2 = videoRef.current;
              if (v2 && v2.readyState >= 2 && v2.videoWidth) {
                canvas.width = v2.videoWidth; canvas.height = v2.videoHeight;
                ctx.drawImage(v2, 0, 0, canvas.width, canvas.height);
                let code = null;
                try { const img = ctx.getImageData(0, 0, canvas.width, canvas.height); code = window.jsQR(img.data, img.width, img.height, { inversionAttempts: "dontInvert" }); } catch (e) {}
                if (code && code.data) {
                  const id = parseClaim(code.data);
                  if (id != null) { st.done = true; claimById(id); return; }
                }
              }
              st.raf = requestAnimationFrame(tick);
            };
            st.raf = requestAnimationFrame(tick);
          })
          .catch(() => { setScanError(true); });
        return () => {
          cancelled = true;
          if (st.raf) cancelAnimationFrame(st.raf);
          if (st.stream) { st.stream.getTracks().forEach(t => t.stop()); st.stream = null; }
        };
      }, [scanning]);

      function togglePlan(id) {
        setPlan(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
      }

      function sharePlan() {
        const url = window.location.origin + window.location.pathname + "?plan=" + plan.join(",");
        if (navigator.share) {
          navigator.share({ title: "NightMarket.fun", url }).catch(() => {});
        } else {
          try {
            navigator.clipboard.writeText(url);
            setShareMsg(t.planShared);
            setTimeout(() => setShareMsg(""), 2000);
          } catch (e) {}
        }
      }

      // English keeps the warm per-state lines; other languages use one clean
      // localized line, since the AI (the normal path) already replies translated.
      function fallbackMsg(stateKey) {
        if (lang === "en" && stateKey) return STATE_MESSAGES[stateKey];
        return t.fallbackGeneric;
      }

      const filteredVendors = categoryFilter === "All" ? VENDORS : VENDORS.filter(v => v.category === categoryFilter);

      async function handleSearch() {
        if (!query.trim()) return;
        setLoading(true);
        setError(null);

        const vendorSummary = VENDORS.map(v =>
          `[ID:${v.id}] ${v.name} | ${v.category} | ${v.subcategory} | ${v.description}${v.products ? " | Offers: " + v.products : ""} | Tags: ${v.tags.join(", ")}${v.priceRange ? " | Price: " + v.priceRange : ""} | Family-friendly: ${v.familyFriendly}`
        ).join("\n");

        try {
          const response = await fetch(PROXY_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query, vendorSummary, lang }),
          });

          if (response.status === 429) {
            const fb = keywordFallback(query);
            setResults({
              vendors: fb.vendors.length > 0 ? fb.vendors : VENDORS.slice(0, 6),
              message: t.rateLimit,
            });
            setCategoryFilter("All");
            return;
          }

          const data = await response.json();
          const text = data.text || "";

          const start = text.indexOf("{");
          const end = text.lastIndexOf("}");
          if (start === -1 || end === -1) throw new Error("No JSON object in response");
          const parsed = JSON.parse(text.slice(start, end + 1));

          const ids = Array.isArray(parsed.ids) ? parsed.ids : [];
          const matched = ids.map(id => VENDORS.find(v => v.id === id)).filter(Boolean);

          if (matched.length === 0 && !parsed.message) {
            const fb = keywordFallback(query);
            if (fb.vendors.length > 0) {
              setResults({ vendors: fb.vendors, message: fallbackMsg(fb.stateKey) });
              setCategoryFilter("All");
              return;
            }
          }

          setResults({ vendors: matched, message: parsed.message || "" });
          setCategoryFilter("All");
        } catch (err) {
          console.error(err);
          const fb = keywordFallback(query);
          if (fb.vendors.length > 0) {
            setResults({ vendors: fb.vendors, message: t.fallbackBusy });
            setCategoryFilter("All");
          } else {
            setError(t.errorNoMatch);
          }
        } finally {
          setLoading(false);
        }
      }

      function handleSuggestion(s) {
        setQuery(s);
        setResults(null);
        setTimeout(() => { const el = inputRef.current; if (el) el.focus(); }, 50);
      }

      function handleClear() {
        setQuery("");
        setResults(null);
        setError(null);
      }

      const displayVendors = results ? results.vendors : filteredVendors;
      const planVendors = plan.map(id => VENDORS.find(v => v.id === id)).filter(Boolean);

      return (
        <React.Fragment>
        {showCover && <IntroCover t={t} onEnter={() => setShowCover(false)} onAbout={() => { setShowCover(false); setShowAbout(true); }} />}
        <div style={{ minHeight: "100vh", background: "linear-gradient(180deg, #12121f 0%, #1a1a2e 30%, #16162a 100%)", color: "#f0ebe3", fontFamily: "'Inter', -apple-system, BlinkMacSystemFont, sans-serif", maxWidth: 480, margin: "0 auto", padding: "0 16px 88px" }}>
          <LanguageToggle lang={lang} onSelect={setLang} />

          <div style={{ paddingTop: 16, paddingBottom: 8, textAlign: "center" }}>
            <img src={LOGO_SRC} alt="NightMarket.fun" style={{ width: "52%", maxWidth: 210, height: "auto", display: "block", margin: "4px auto 6px" }} />
            <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: "0.18em", color: "#ff6b35", textTransform: "uppercase" }}>{"2026 "}{t.navPassport}</div>
          </div>

          {tab === "discover" && (
            <React.Fragment>
              <div style={{ textAlign: "center", marginBottom: 16 }}>
                <h1 style={{ fontSize: 22, fontWeight: 800, margin: "8px 0 4px", lineHeight: 1.2, color: "#f0ebe3" }}>{t.title}</h1>
                <p style={{ fontSize: 14, color: "#f0ebe3", opacity: 0.5, margin: 0 }}>{t.subtitle}</p>
              </div>

              <div style={{ position: "relative", marginBottom: 16 }}>
                <input ref={inputRef} type="text" value={query}
                  onChange={e => { setQuery(e.target.value); if (results) setResults(null); }}
                  onKeyDown={e => e.key === "Enter" && handleSearch()}
                  placeholder={t.placeholder}
                  style={{ width: "100%", padding: "14px 90px 14px 16px", borderRadius: 12, border: "1px solid #333350", background: "#1e1e30", color: "#f0ebe3", fontSize: 15, outline: "none", boxSizing: "border-box" }} />
                <div style={{ position: "absolute", right: 6, top: "50%", transform: "translateY(-50%)", display: "flex", gap: 4 }}>
                  {query && (
                    <button onClick={handleClear} style={{ padding: "8px 10px", borderRadius: 8, border: "none", background: "transparent", color: "#f0ebe3", opacity: 0.4, fontSize: 14, cursor: "pointer" }}>✕</button>
                  )}
                  <button onClick={handleSearch} disabled={loading || !query.trim()} style={{ padding: "8px 16px", borderRadius: 8, border: "none", background: loading ? "#333350" : "#ff6b35", color: "#fff", fontSize: 14, fontWeight: 600, cursor: loading ? "default" : "pointer", opacity: !query.trim() ? 0.4 : 1 }}>
                    {loading ? "..." : t.go}
                  </button>
                </div>
              </div>

              {!results && !loading && (
                <div style={{ marginBottom: 20 }}>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                    {t.suggested.map(s => (
                      <button key={s} onClick={() => handleSuggestion(s)} style={{ padding: "6px 12px", borderRadius: 20, border: "1px solid #333350", background: "transparent", color: "#f0ebe3", opacity: 0.6, fontSize: 12, cursor: "pointer", whiteSpace: "nowrap" }}>{s}</button>
                    ))}
                  </div>
                </div>
              )}

              {results?.message && (
                <div style={{ background: "linear-gradient(135deg, #ff6b3515, #9b59b615)", border: "1px solid #333350", borderRadius: 12, padding: 14, marginBottom: 16, fontSize: 14, lineHeight: 1.5, color: "#f0ebe3", opacity: 0.9 }}>{results.message}</div>
              )}

              {error && (
                <div style={{ background: "#ff6b3520", border: "1px solid #ff6b3550", borderRadius: 12, padding: 14, marginBottom: 16, fontSize: 14, color: "#ff6b35" }}>{error}</div>
              )}

              {loading && (
                <div style={{ textAlign: "center", padding: "40px 0", color: "#f0ebe3", opacity: 0.5 }}>
                  <div style={{ fontSize: 24, marginBottom: 8 }}>🏮</div>
                  <div style={{ fontSize: 14 }}>{t.loading}</div>
                </div>
              )}

              {!results && !loading && (
                <div style={{ marginBottom: 16 }}><CategoryFilter selected={categoryFilter} onSelect={setCategoryFilter} t={t} /></div>
              )}

              {!loading && (
                <div style={{ fontSize: 12, color: "#f0ebe3", opacity: 0.4, marginBottom: 12 }}>
                  {results ? t.resultsFor(displayVendors.length, query) : t.listings(displayVendors.length)}
                </div>
              )}

              {!loading && displayVendors.map(v => (
                <VendorCard key={v.id} vendor={v} freeLabel={t.free} lang={lang} onOpen={setActiveListing} inPlan={plan.includes(v.id)} onTogglePlan={togglePlan} addLabel={t.addToPlan} inPlanLabel={t.inPlan} />
              ))}

              {results && !loading && (
                <button onClick={handleClear} style={{ display: "block", width: "100%", padding: 14, marginTop: 8, borderRadius: 12, border: "1px solid #333350", background: "transparent", color: "#f0ebe3", opacity: 0.6, fontSize: 14, cursor: "pointer", textAlign: "center" }}>{t.browseAll}</button>
              )}

              <PartnerStrip t={t} onAbout={() => setShowAbout(true)} />
              <div style={{ textAlign: "center", marginTop: 16, fontSize: 11, color: "#f0ebe3", opacity: 0.3 }}>{t.createdBy}</div>
            </React.Fragment>
          )}

          {tab === "plan" && (
            <React.Fragment>
              <h1 style={{ fontSize: 22, fontWeight: 800, margin: "8px 0 16px", color: "#f0ebe3", textAlign: "center" }}>{t.planTitle}</h1>
              {planVendors.length === 0 ? (
                <div style={{ textAlign: "center", padding: "40px 20px", color: "#f0ebe3", opacity: 0.5, fontSize: 14, lineHeight: 1.6 }}>{t.planEmpty}</div>
              ) : (
                <React.Fragment>
                  <button onClick={sharePlan} style={{ display: "block", width: "100%", padding: 14, marginBottom: 16, borderRadius: 12, border: "none", background: "#ff6b35", color: "#fff", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>{shareMsg || ("🔗 " + t.planShare)}</button>
                  {planVendors.map(v => (
                    <VendorCard key={v.id} vendor={v} freeLabel={t.free} lang={lang} onOpen={setActiveListing} inPlan={true} onTogglePlan={togglePlan} addLabel={t.addToPlan} inPlanLabel={t.inPlan} />
                  ))}
                </React.Fragment>
              )}
            </React.Fragment>
          )}

          {tab === "map" && (
            <div style={{ textAlign: "center", paddingTop: 12 }}>
              <h1 style={{ fontSize: 22, fontWeight: 800, margin: "8px 0 0", color: "#f0ebe3" }}>{t.mapTitle}</h1>
              <div style={{ background: "#1e1e30", border: "1px dashed #333350", borderRadius: 16, padding: "56px 20px", marginTop: 16 }}>
                <div style={{ fontSize: 44, marginBottom: 14 }}>🗺️</div>
                <div style={{ fontSize: 14, color: "#f0ebe3", opacity: 0.6, lineHeight: 1.5 }}>{t.mapDesc}</div>
                <span style={{ display: "inline-block", marginTop: 14, fontSize: 11, color: "#ff6b35", border: "1px solid #ff6b3550", borderRadius: 20, padding: "3px 12px", fontWeight: 600 }}>{t.comingSoon}</span>
              </div>
              <a href={GOODMAPS_URL || undefined} target="_blank" rel="noopener noreferrer"
                 onClick={e => { if (!GOODMAPS_URL) e.preventDefault(); }}
                 style={{ display: "block", textDecoration: "none", marginTop: 14, background: "#1e1e30", border: "1px solid #333350", borderRadius: 12, padding: 14, cursor: GOODMAPS_URL ? "pointer" : "default" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, textAlign: "left" }}>
                  <span style={{ fontSize: 24 }}>🧭</span>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 14, fontWeight: 700, color: "#f0ebe3" }}>{t.mapGoodmaps}</div>
                    <div style={{ fontSize: 12, color: "#f0ebe3", opacity: 0.5, marginTop: 2, lineHeight: 1.4 }}>{t.mapGoodmapsNote}</div>
                  </div>
                  <span style={{ fontSize: 16, color: "#ff6b35" }}>↗</span>
                </div>
                {!GOODMAPS_URL && (
                  <div style={{ fontSize: 10, color: "#ff6b35", opacity: 0.85, marginTop: 8, textAlign: "right", fontWeight: 600 }}>{t.comingSoon}</div>
                )}
              </a>
            </div>
          )}

          {tab === "passport" && (
            <div style={{ paddingTop: 12 }}>
              <h1 style={{ fontSize: 22, fontWeight: 800, margin: "8px 0 6px", color: "#f0ebe3", textAlign: "center" }}>{t.mahjongTitle}</h1>

              {/* How it works - directly under the title, collapsed by default */}
              <button onClick={() => setShowRules(!showRules)}
                style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between", background: "transparent", border: "none", borderBottom: "1px solid #2a2a40", padding: "10px 2px", cursor: "pointer", color: "#f0ebe3", marginBottom: 16 }}>
                <span style={{ fontSize: 13, fontWeight: 700 }}>{t.howTitle}</span>
                <span style={{ width: 22, height: 22, borderRadius: "50%", border: "1px solid #ff6b35", color: "#ff6b35", fontSize: 13, display: "flex", alignItems: "center", justifyContent: "center" }}>{showRules ? "\u2013" : "?"}</span>
              </button>
              {showRules && (
                <p style={{ fontSize: 14, color: "#f0ebe3", opacity: 0.72, lineHeight: 1.6, margin: "-6px 0 16px" }}>{t.rulesBody}</p>
              )}

              {/* Points + next reward */}
              <div style={{ background: "#1e1e30", borderRadius: 16, padding: "18px 16px", marginBottom: 16, textAlign: "center", border: "1px solid #2a2a40" }}>
                <div style={{ fontSize: 42, fontWeight: 800, color: "#ff6b35", lineHeight: 1 }}>{points}</div>
                <div style={{ fontSize: 12, color: "#f0ebe3", opacity: 0.6, marginTop: 4, textTransform: "uppercase", letterSpacing: "0.12em" }}>{t.pointsLabel}</div>
                <div style={{ marginTop: 14 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#f0ebe3", opacity: 0.6, marginBottom: 5 }}>
                    <span>{t.nextReward}</span><span>{points} / {nextTier}</span>
                  </div>
                  <div style={{ height: 7, borderRadius: 4, background: "#2a2a40", overflow: "hidden" }}>
                    <div style={{ width: rewardPct + "%", height: "100%", background: "linear-gradient(90deg,#ff6b35,#e74c8b)" }} />
                  </div>
                </div>
              </div>

              {/* Primary action at the event: scan a booth code in-app (no new tabs) */}
              <button onClick={() => { setScanError(false); setScanning(true); }}
                style={{ width: "100%", padding: 14, borderRadius: 14, border: "none", background: "linear-gradient(135deg,#ff6b35,#e74c8b)", color: "#fff", fontSize: 15, fontWeight: 800, cursor: "pointer", marginBottom: 16, display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
                <span style={{ fontSize: 17 }}>📷</span> {t.scanCta}
              </button>

              {/* Head start: partner follows / newsletters - collapsible */}
              <div style={{ background: "linear-gradient(135deg,#ff6b3522,#9b59b622)", border: "1px solid #ff6b3555", borderRadius: 16, padding: "4px 16px", marginBottom: 16 }}>
                <button onClick={() => setShowHeadStart(!showHeadStart)}
                  style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between", background: "transparent", border: "none", padding: "12px 0", cursor: "pointer" }}>
                  <span style={{ fontSize: 16, fontWeight: 800, color: "#f0ebe3" }}>{t.headStartTitle}</span>
                  <span style={{ color: "#ff6b35", opacity: 0.8, fontSize: 12 }}>{showHeadStart ? "\u25B2" : "\u25BC"}</span>
                </button>
                {showHeadStart && (
                  <div style={{ paddingBottom: 12 }}>
                    <p style={{ fontSize: 13, color: "#f0ebe3", opacity: 0.72, lineHeight: 1.5, margin: "0 0 6px" }}>{t.headStartBody}</p>
                    {PASSPORT_PARTNERS.map((pr) => (
                      <div key={pr.name} style={{ padding: "10px 0 2px", borderTop: "1px solid #ffffff14" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
                          <div style={{ width: 34, height: 34, borderRadius: 8, background: pr.bg, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, overflow: "hidden" }}>
                            <img src={pr.logo} alt="" style={{ width: "82%", height: "82%", objectFit: "contain" }} />
                          </div>
                          <div style={{ flex: 1, fontSize: 13, fontWeight: 600, color: "#f0ebe3" }}>{pr.name}</div>
                        </div>
                        <div style={{ display: "flex", gap: 8 }}>
                          <span style={{ flex: 1, background: "#ffffff10", border: "1px solid #ffffff26", borderRadius: 20, padding: "7px 4px", fontSize: 12, fontWeight: 600, color: "#f0ebe3", textAlign: "center" }}>{t.follow} <span style={{ color: "#ff6b35" }}>+10</span></span>
                          <span style={{ flex: 1, background: "#ffffff10", border: "1px solid #ffffff26", borderRadius: 20, padding: "7px 4px", fontSize: 12, fontWeight: 600, color: "#f0ebe3", textAlign: "center" }}>{t.subscribe} <span style={{ color: "#ff6b35" }}>+10</span></span>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>

              {/* Completed sets shelf */}
              <div style={{ marginBottom: 16 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: "#f0ebe3", marginBottom: 9 }}>{t.setsLabel}</div>
                {PASSPORT_SETS.length === 0 ? (
                  <div style={{ background: "#1e1e30", border: "1px dashed #2a2a40", borderRadius: 12, padding: "14px 12px", fontSize: 12.5, color: "#f0ebe3", opacity: 0.5, lineHeight: 1.5 }}>{t.setsEmpty}</div>
                ) : (
                <div style={{ display: "flex", flexWrap: "wrap", gap: 10 }}>
                  {PASSPORT_SETS.map((set, i) => (
                    <div key={i} style={{ background: "#1e1e30", border: "1px solid #2a2a40", borderRadius: 12, padding: "10px 12px" }}>
                      <div style={{ display: "flex", gap: 5 }}>
                        {set.tiles.map((ti, k) => (<TileFace key={k} suit={set.suit} rank={ti} size={30} highlight />))}
                      </div>
                      <div style={{ textAlign: "center", marginTop: 7, fontSize: 10, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: "#f0ebe3", opacity: 0.55 }}>{set.kind === "run" ? t.labelRun : t.labelTriplet}</div>
                      <div style={{ textAlign: "center", marginTop: 2, fontSize: 13, fontWeight: 800, color: "#ff6b35" }}>+{set.pts}</div>
                    </div>
                  ))}
                </div>
                )}
              </div>

              {/* Collection: per-suit progress (doubles as the legend); tap to expand */}
              <div style={{ marginBottom: 6 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: "#f0ebe3", marginBottom: 9 }}>{t.collectionLabel}</div>
                <div style={{ background: "#1e1e30", borderRadius: 14, overflow: "hidden", border: "1px solid #2a2a40" }}>
                  {PASSPORT_SUITS.map((sgrp, i) => (
                    <div key={sgrp.suit}>
                      <div onClick={() => setExpandedSuit(expandedSuit === sgrp.suit ? null : sgrp.suit)}
                        style={{ display: "flex", alignItems: "center", gap: 12, padding: "11px 14px", borderTop: i > 0 ? "1px solid #2a2a40" : "none", cursor: "pointer" }}>
                        <TileFace suit={sgrp.suit} size={32} />
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 14, fontWeight: 600, color: "#f0ebe3" }}>{sgrp.label}</div>
                          <div style={{ height: 6, borderRadius: 3, background: "#2a2a40", marginTop: 6, overflow: "hidden" }}>
                            <div style={{ width: Math.round(sgrp.owned / sgrp.total * 100) + "%", height: "100%", background: sgrp.color }} />
                          </div>
                        </div>
                        <div style={{ fontSize: 13, color: "#f0ebe3", opacity: 0.6, flexShrink: 0, minWidth: 46, textAlign: "right" }}>{sgrp.owned}/{sgrp.total}</div>
                        <div style={{ color: "#f0ebe3", opacity: 0.4, fontSize: 11, flexShrink: 0 }}>{expandedSuit === sgrp.suit ? "\u25B2" : "\u25BC"}</div>
                      </div>
                      {expandedSuit === sgrp.suit && (
                        <div style={{ display: "flex", flexWrap: "wrap", gap: 7, padding: "2px 14px 14px" }}>
                          {suitGrid(sgrp.suit).map((tl, k) => (<TileFace key={k} suit={sgrp.suit} rank={tl.rank} owned={tl.owned} size={30} />))}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              </div>

              <div style={{ textAlign: "center" }}>
                <span style={{ display: "inline-block", marginTop: 14, fontSize: 11, color: "#ff6b35", border: "1px solid #ff6b3550", borderRadius: 20, padding: "3px 12px", fontWeight: 600 }}>{t.comingSoon}</span>
                <div>
                  <button onClick={() => setShowQR(true)} style={{ marginTop: 12, fontSize: 11, color: "#f0ebe390", background: "transparent", border: "1px solid #2a2a40", borderRadius: 20, padding: "5px 14px", cursor: "pointer", fontWeight: 600 }}>🔳 Demo: QR codes</button>
                </div>
              </div>
            </div>
          )}

          <BottomNav tab={tab} onSelect={setTab} t={t} />
          <ProfileOverlay vendor={activeListing} lang={lang} t={t} inPlan={activeListing ? plan.includes(activeListing.id) : false} onTogglePlan={togglePlan} onClose={() => setActiveListing(null)} />
          {showAbout && <AboutPartners t={t} onClose={() => setShowAbout(false)} />}

          {/* Claim confirmation when a booth QR is scanned */}
          {claimToast && (
            <div onClick={() => setClaimToast(null)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", zIndex: 70, display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
              <div onClick={e => e.stopPropagation()} style={{ background: "#16162a", border: "1px solid #2a2a40", borderRadius: 20, padding: "26px 22px", maxWidth: 320, textAlign: "center" }}>
                <div style={{ display: "flex", justifyContent: "center", marginBottom: 12 }}>
                  <TileFace suit={claimToast.suit} rank={claimToast.rank} size={64} highlight />
                </div>
                <div style={{ fontSize: 16, fontWeight: 800, color: "#f0ebe3" }}>{claimToast.dup ? t.tileDup : t.tileGet}</div>
                <div style={{ fontSize: 13, color: "#f0ebe3", opacity: 0.7, marginTop: 4 }}>{claimToast.name}</div>
                {!claimToast.dup && <div style={{ fontSize: 14, fontWeight: 800, color: "#ff6b35", marginTop: 10 }}>+10 {t.pointsLabel}</div>}
                <button onClick={() => setClaimToast(null)} style={{ marginTop: 16, width: "100%", padding: 12, borderRadius: 12, border: "none", background: "#ff6b35", color: "#fff", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>✓</button>
              </div>
            </div>
          )}

          {/* In-app camera scanner */}
          {scanning && (
            <div style={{ position: "fixed", inset: 0, background: "#000", zIndex: 66, display: "flex", flexDirection: "column" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 16px" }}>
                <div style={{ fontSize: 15, fontWeight: 700, color: "#fff" }}>{t.scanCta}</div>
                <button onClick={() => setScanning(false)} style={{ background: "transparent", border: "none", color: "#fff", fontSize: 22, cursor: "pointer" }}>✕</button>
              </div>
              {scanError ? (
                <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: 28 }}>
                  <p style={{ color: "#fff", opacity: 0.85, fontSize: 14, lineHeight: 1.6, textAlign: "center" }}>{t.scanError}</p>
                </div>
              ) : (
                <div style={{ flex: 1, position: "relative", overflow: "hidden" }}>
                  <video ref={videoRef} muted playsInline style={{ width: "100%", height: "100%", objectFit: "cover" }} />
                  <div style={{ position: "absolute", top: "50%", left: "50%", transform: "translate(-50%,-50%)", width: 230, height: 230, border: "3px solid #ffffffcc", borderRadius: 20, boxShadow: "0 0 0 100vmax rgba(0,0,0,0.45)" }} />
                  <div style={{ position: "absolute", bottom: 44, left: 0, right: 0, textAlign: "center", color: "#fff", fontSize: 14, fontWeight: 600, textShadow: "0 1px 4px rgba(0,0,0,0.85)" }}>{t.scanHint}</div>
                </div>
              )}
            </div>
          )}

          {/* QR test screen: generates a scannable code per category from the live URL */}
          {showQR && (
            <div style={{ position: "fixed", inset: 0, background: "#0d0d1a", zIndex: 65, overflowY: "auto" }}>
              <div style={{ maxWidth: 480, margin: "0 auto", padding: "20px 18px 40px" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                  <div style={{ fontSize: 18, fontWeight: 800, color: "#f0ebe3" }}>Demo QR codes</div>
                  <button onClick={() => setShowQR(false)} style={{ background: "transparent", border: "none", color: "#f0ebe3", opacity: 0.6, fontSize: 20, cursor: "pointer" }}>✕</button>
                </div>
                <p style={{ fontSize: 13, color: "#f0ebe3", opacity: 0.6, lineHeight: 1.5, marginTop: 0 }}>Scan any code with a phone (or open it on this device) to collect that booth's tile. One per mahjong suit.</p>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                  {DEMO_QR_IDS.map(id => {
                    const tile = TILE_BY_ID[id];
                    if (!tile) return null;
                    const colors = CATEGORY_COLORS[tile.category];
                    const url = (window.location.origin + window.location.pathname).replace(/\/$/, "") + "?claim=" + id;
                    const data = qrDataURL(url);
                    return (
                      <div key={id} style={{ background: "#16162a", border: `1px solid ${colors.border}55`, borderRadius: 14, padding: 12, textAlign: "center" }}>
                        <div style={{ fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.05em", color: colors.text, marginBottom: 8 }}>{colors.icon} {t.categories[tile.category]}</div>
                        {data ? (
                          <img src={data} alt="" style={{ width: "100%", maxWidth: 140, borderRadius: 8, display: "block", margin: "0 auto" }} />
                        ) : (
                          <div style={{ fontSize: 10, color: "#f0ebe3", opacity: 0.6, wordBreak: "break-all" }}>{url}</div>
                        )}
                        <div style={{ fontSize: 12, fontWeight: 700, color: "#f0ebe3", marginTop: 8 }}>{tile.name}</div>
                        <a href={url} style={{ fontSize: 11, color: colors.text, textDecoration: "none" }}>open on this device →</a>
                      </div>
                    );
                  })}
                </div>
                <button onClick={resetTiles} style={{ marginTop: 18, width: "100%", padding: 12, borderRadius: 12, border: "1px solid #2a2a40", background: "transparent", color: "#f0ebe3", opacity: 0.8, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>Reset my collected tiles</button>
              </div>
            </div>
          )}
        </div>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<NMFDiscover />);
  </script>
</body>
</html>
