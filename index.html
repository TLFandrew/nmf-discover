      { id: 1, name: "Red Dragon Bao", category: "Food", subcategory: "Taiwanese", description: "Handcrafted steamed bao buns with traditional and fusion fillings. Signature item: braised pork belly bao with pickled mustard greens.", tags: ["taiwanese", "bao", "street food", "pork", "vegetarian options"], priceRange: "$", familyFriendly: true, i18n: { es: { subcategory: "Taiwanesa", description: "Panecillos bao al vapor hechos a mano con rellenos tradicionales y de fusión. Especialidad: bao de panza de cerdo estofada con encurtido de hojas de mostaza." }, zh: { subcategory: "台湾", description: "手工制作的蒸包，传统与创意馅料兼备。招牌：红烧五花肉配酸菜包。" }, ko: { subcategory: "대만", description: "전통과 퓨전 속을 채운 수제 찐빵(바오). 대표 메뉴: 간장 삼겹살과 갓절임을 넣은 바오." } } },
      { id: 2, name: "Junbi Matcha", category: "Food", subcategory: "Japanese", description: "Premium ceremonial-grade matcha drinks and matcha-based desserts. Specialty: hand-whisked matcha latte with oat milk.", tags: ["japanese", "matcha", "drinks", "dessert", "vegan options"], priceRange: "$", familyFriendly: true, i18n: {"es":{"subcategory":"Japonesa","description":"Bebidas de matcha de grado ceremonial premium y postres a base de matcha. Especialidad: latte de matcha batido a mano con leche de avena."},"zh":{"subcategory":"日本","description":"顶级仪式级抹茶饮品与抹茶甜点。招牌：手打抹茶燕麦奶拿铁。"},"ko":{"subcategory":"일본","description":"프리미엄 의식용 등급 말차 음료와 말차 디저트. 대표 메뉴: 손으로 저은 귀리우유 말차 라떼."}} },

      { id: 4, name: "Happy Lemon", category: "Food", subcategory: "Taiwanese", description: "Bubble tea and fruit tea specialists with over 30 flavor combinations. Known for rock salt cheese tea series.", tags: ["taiwanese", "boba", "bubble tea", "drinks", "sweet"], priceRange: "$", familyFriendly: true, i18n: {"es":{"subcategory":"Taiwanesa","description":"Especialistas en té de burbujas y té de frutas con más de 30 combinaciones de sabores. Famosos por su serie de té con crema de queso y sal."},"zh":{"subcategory":"台湾","description":"珍珠奶茶与水果茶专家，提供超过 30 种口味组合。以海盐芝士茶系列闻名。"},"ko":{"subcategory":"대만","description":"30가지가 넘는 맛 조합을 자랑하는 버블티·과일차 전문점. 암염 치즈티 시리즈로 유명해요."}} },
      { id: 5, name: "Ming Da's Cambodian Kitchen", category: "Food", subcategory: "Cambodian", description: "Authentic Cambodian street food including lok lak, num pang sandwiches, and Phnom Penh noodles. Recipes from Battambang province.", tags: ["cambodian", "street food", "noodles", "sandwiches", "spicy"], priceRange: "$", familyFriendly: true, i18n: {"es":{"subcategory":"Camboyana","description":"Auténtica comida callejera camboyana: lok lak, sándwiches num pang y fideos de Phnom Penh. Recetas de la provincia de Battambang."},"zh":{"subcategory":"柬埔寨","description":"正宗柬埔寨街头美食，包括 lok lak 炒牛肉、num pang 三明治和金边米粉。源自马德望省的食谱。"},"ko":{"subcategory":"캄보디아","description":"록락, 눔빵 샌드위치, 프놈펜 누들 등 정통 캄보디아 길거리 음식. 바탐방 지방의 레시피."}} },

      { id: 10, name: "Chaat & Chai", category: "Food", subcategory: "Indian", description: "Indian street snacks and masala chai. Pani puri, samosa chaat, and dahi vada made fresh to order. Mango lassi for the adventurous.", tags: ["indian", "chaat", "chai", "snacks", "vegetarian", "vegan options"], priceRange: "$", familyFriendly: true, i18n: {"es":{"subcategory":"India","description":"Aperitivos callejeros indios y chai masala. Pani puri, samosa chaat y dahi vada hechos al momento. Lassi de mango para los más atrevidos."},"zh":{"subcategory":"印度","description":"印度街头小吃与玛萨拉奶茶。现做的 pani puri、samosa chaat 和 dahi vada。喜欢尝鲜可试芒果拉西。"},"ko":{"subcategory":"인도","description":"인도 길거리 간식과 마살라 짜이. 즉석에서 만드는 파니 푸리, 사모사 차트, 다히 바다. 모험을 즐긴다면 망고 라씨도 추천해요."}} },

      { id: 12, name: "Nasi Lemak ATX", category: "Food", subcategory: "Malaysian", description: "Malaysia's national dish: fragrant coconut rice with sambal, fried anchovies, peanuts, cucumber, and your choice of protein. Rendang on weekends.", tags: ["malaysian", "rice", "coconut", "sambal", "spicy"], priceRange: "$", familyFriendly: true, i18n: {"es":{"subcategory":"Malasia","description":"El plato nacional de Malasia: arroz aromático de coco con sambal, anchoas fritas, cacahuetes, pepino y la proteína que elijas. Rendang los fines de semana."},"zh":{"subcategory":"马来西亚","description":"马来西亚国菜：香浓椰浆饭配参巴酱、炸江鱼仔、花生、黄瓜及自选主菜。周末供应仁当（rendang）。"},"ko":{"subcategory":"말레이시아","description":"삼발, 멸치튀김, 땅콩, 오이를 곁들인 향긋한 코코넛 밥에 원하는 단백질 선택. 주말에는 른당 제공."}} },

      { id: 19, name: "Ziespok You", category: "Artist", subcategory: "Digital Art", description: "Digital art and NFT-inspired prints featuring surreal landscapes infused with East Asian architectural elements.", tags: ["digital art", "prints", "surreal", "architecture", "east asian", "contemporary"], priceRange: "$$", familyFriendly: true, i18n: {"es":{"subcategory":"Arte Digital","description":"Arte digital y láminas de inspiración NFT con paisajes surrealistas impregnados de elementos arquitectónicos del este de Asia."},"zh":{"subcategory":"数字艺术","description":"数字艺术与受 NFT 启发的版画，描绘融入东亚建筑元素的超现实景观。"},"ko":{"subcategory":"디지털 아트","description":"동아시아 건축 요소를 녹여낸 초현실적 풍경의 디지털 아트와 NFT 영감 프린트."}} },
      { id: 20, name: "Lisa Crawford", category: "Artist", subcategory: "Watercolor", description: "Delicate watercolor botanicals and wildlife paintings inspired by Hawaiian and Pacific Islander natural environments.", tags: ["watercolor", "botanical", "hawaiian", "pacific islander", "nature", "prints"], priceRange: "$$", familyFriendly: true, i18n: {"es":{"subcategory":"Acuarela","description":"Delicadas acuarelas botánicas y de fauna inspiradas en los entornos naturales de Hawái y las islas del Pacífico."},"zh":{"subcategory":"水彩","description":"细腻的水彩植物与野生动物画作，灵感源自夏威夷与太平洋岛屿的自然环境。"},"ko":{"subcategory":"수채화","description":"하와이와 태평양 섬의 자연환경에서 영감을 받은 섬세한 수채 식물·야생동물 그림."}} },

        footer: "NightMarket.fun은 The Lunar Foundation의 프로그램입니다",
        free: "무료",
        categories: { All: "전체", Food: "음식", Artist: "아티스트", Performance: "공연", Activity: "체험" },
        resultsFor: (n, q) => `"${q}" 검색결과 ${n}개`,
        listings: (n) => `${n}개 항목`,
        fallbackGeneric: "마음에 드실 만한 추천을 골라봤어요.",
        fallbackBusy: "스마트 가이드가 바빠서 키워드 검색 결과를 보여드려요.",
        rateLimit: "지금 검색량이 많아요. 우선 빠른 추천을 보여드려요. 잠시 후 다시 시도해 주세요.",
        errorNoMatch: "일치하는 결과를 찾지 못했어요. 다르게 입력하거나 아래에서 전체 부스를 둘러보세요.",
        suggested: [
          "매운 음식이 먹고 싶어요",
          "아이들에게 좋은 건 뭐가 있나요?",
          "전통 무용을 보고 싶어요",
          "수공예 선물은 어디서 사나요?",
          "무대에서는 무슨 공연을 하나요?",
          "저는 비건인데 뭘 먹을 수 있나요?",
          "재미있는 체험거리를 찾아요",
          "한국 문화를 좋아해요",
        ],
      },
    };

    const STATE_MESSAGES = {
      thirsty: "Sounds like you need a drink. Here's where to cool off.",
      drink: "Here's where to grab something to sip.",
      hungry: "Let's get you fed. A few favorites to start with.",
      hot: "Let's cool you down with these picks.",
      cold: "Warm up with these. November evenings get chilly out here.",
      sweet: "A sweet tooth, got it. Try these.",
      tired: "Need a breather? These spots are made for slowing down.",
      stressed: "Take a beat. These are the calmest corners of the market.",
      relax: "Here's where to unwind for a bit.",
      love: "Aw. Here are some sweet things to share together.",
      sad: "Sorry you're feeling low. A little comfort food or something sweet might help.",
      bored: "Let's fix that. Here's where the fun is.",
      lonely: "Come find some good company. These spots are easy to settle into.",
      happy: "Love the energy. Here's where to take it.",
      excited: "Love the energy. Here's where to take it.",
      dance: "Let's find you a beat.",
      kids: "Plenty for the little ones. Here's where to head.",
      family: "Great picks for the whole family.",
      gift: "Looking for something to take home? Start here.",
    };

    function keywordFallback(q) {
      const text = q.toLowerCase();
      const expansions = {
        thirsty: ["drinks", "boba", "bubble tea", "matcha", "tea", "chai", "taro"],
        drink: ["drinks", "boba", "bubble tea", "matcha", "tea", "chai"],
        hungry: ["street food", "rice bowls", "noodles", "comfort food", "bbq"],
        hot: ["shaved ice", "dessert", "boba", "drinks", "matcha"],
        cold: ["chai", "matcha", "grilled", "noodles", "comfort food"],
        sweet: ["dessert", "sweet", "boba", "shaved ice", "mochi", "taro"],
        spicy: ["spicy"],
        tired: ["lounge", "chill", "seating", "relaxation"],
        stressed: ["lounge", "chill", "relaxation", "craft", "meditative"],
        relax: ["lounge", "chill", "relaxation", "ambient"],
        love: ["photos", "lantern", "souvenir", "cultural"],
        sad: ["comfort food", "sweet", "dessert", "lounge", "chill"],
        bored: ["game", "interactive", "challenge", "craft", "dance"],
        lonely: ["lounge", "social", "chill", "collaborative"],
        happy: ["dance", "k-pop", "dj", "high energy"],
        excited: ["dance", "k-pop", "dj", "high energy"],
        dance: ["dance", "k-pop", "dj", "high energy"],
        kids: ["kids", "family", "all ages", "game", "interactive"],
        family: ["family", "kids", "all ages", "interactive"],
        gift: ["prints", "stickers", "handmade", "jewelry", "accessories", "apparel"],
        vegan: ["vegan options", "vegetarian"],
        vegetarian: ["vegetarian", "vegan options"],
      };
      const STOPWORDS = new Set([
        "im", "the", "and", "for", "are", "you", "want", "like", "some", "something",
        "looking", "feel", "feeling", "really", "just", "need", "got", "any", "what",
        "whats", "where", "have", "this", "that", "give", "show", "find", "with",
      ]);

      const words = text.split(/[^a-z]+/).filter(w => w.length >= 3 && !STOPWORDS.has(w));
      const terms = new Set(words);
      let matchedState = null;
      words.forEach(w => {
        const stem = w.replace(/(ing|ed|s)$/, "");
        Object.keys(expansions).forEach(key => {
          if (w.includes(key) || key.includes(stem)) {
            expansions[key].forEach(t => terms.add(t));
            if (STATE_MESSAGES[key] && !matchedState) matchedState = key;
          }
        });
      });

      const scored = VENDORS.map(v => {
        const tagStr = (v.tags.join(" ") + " " + v.subcategory).toLowerCase();
        const descStr = `${v.name} ${v.description}`.toLowerCase();
        const tagWords = new Set(tagStr.split(/[^a-z]+/).filter(Boolean));
        const descWords = new Set(descStr.split(/[^a-z]+/).filter(Boolean));
        let score = 0;
        terms.forEach(t => {
          if (t.includes(" ")) {
            if (tagStr.includes(t)) score += 2;
            else if (descStr.includes(t)) score += 1;
          } else {
            if (tagWords.has(t)) score += 2;
            else if (descWords.has(t)) score += 1;
          }
        });
        return { v, score };
      }).filter(x => x.score > 0)
        .sort((a, b) => b.score - a.score)
        .slice(0, 6)
        .map(x => x.v);

      return { vendors: scored, stateKey: matchedState };
    }

    function VendorCard({ vendor, freeLabel, lang }) {
      const colors = CATEGORY_COLORS[vendor.category];
      const loc = vendor.i18n && vendor.i18n[lang];
      const subcategory = (loc && loc.subcategory) || vendor.subcategory;
      const description = (loc && loc.description) || vendor.description;
      return (
        <div style={{ background: "#1e1e30", borderRadius: 12, padding: 16, borderLeft: `3px solid ${colors.border}`, marginBottom: 12 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 11, fontWeight: 600, color: colors.text, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 4 }}>
                {colors.icon} {subcategory}
              </div>
              <div style={{ fontSize: 17, fontWeight: 700, color: "#f0ebe3" }}>{vendor.name}</div>
            </div>
            {vendor.priceRange !== "Free" && (
              <span style={{ fontSize: 13, color: "#f0ebe3", opacity: 0.6, fontWeight: 500 }}>{vendor.priceRange}</span>
            )}
            {vendor.priceRange === "Free" && (
              <span style={{ fontSize: 11, background: "#2ecc7130", color: "#2ecc71", padding: "2px 8px", borderRadius: 20, fontWeight: 600 }}>{freeLabel}</span>
            )}
          </div>
          <p style={{ fontSize: 14, color: "#f0ebe3", opacity: 0.75, lineHeight: 1.5, margin: 0 }}>{description}</p>
        </div>
      );
    }

    function CategoryFilter({ selected, onSelect, t }) {
      const categories = ["All", "Food", "Artist", "Performance", "Activity"];
      return (
        <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 4, WebkitOverflowScrolling: "touch" }}>
          {categories.map(cat => {
            const isSelected = selected === cat;
            const colors = cat !== "All" ? CATEGORY_COLORS[cat] : null;
            return (
              <button key={cat} onClick={() => onSelect(cat)} style={{ padding: "6px 14px", borderRadius: 20, border: "none", fontSize: 13, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap", background: isSelected ? (colors ? colors.border : "#f0ebe3") : "#2a2a40", color: isSelected ? (cat === "All" ? "#1a1a2e" : "#fff") : "#f0ebe390", transition: "all 0.2s" }}>
                {colors ? `${colors.icon} ` : ""}{t.categories[cat]}
              </button>
            );
          })}
        </div>
      );
    }

    function LanguageToggle({ lang, onSelect }) {
      return (
        <div style={{ display: "flex", justifyContent: "center", gap: 6, paddingTop: 16 }}>
          {LANGS.map(l => {
            const isSelected = lang === l.code;
            return (
              <button key={l.code} onClick={() => onSelect(l.code)} style={{ padding: "5px 12px", borderRadius: 20, border: "1px solid", borderColor: isSelected ? "#ff6b35" : "#333350", background: isSelected ? "#ff6b35" : "transparent", color: isSelected ? "#fff" : "#f0ebe390", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
                {l.label}
              </button>
            );
          })}
        </div>
      );
    }

    function NMFDiscover() {
      const [lang, setLang] = useState("en");
      const [query, setQuery] = useState("");
      const [results, setResults] = useState(null);
      const [loading, setLoading] = useState(false);
      const [categoryFilter, setCategoryFilter] = useState("All");
      const [error, setError] = useState(null);
      const inputRef = useRef(null);

      const t = TRANSLATIONS[lang];

      // English keeps the warm per-state lines; other languages use one clean
      // localized line, since the AI (the normal path) already replies translated.
      function fallbackMsg(stateKey) {
        if (lang === "en" && stateKey) return STATE_MESSAGES[stateKey];
        return t.fallbackGeneric;
      }

      const filteredVendors = categoryFilter === "All" ? VENDORS : VENDORS.filter(v => v.category === categoryFilter);

      async function handleSearch() {
        if (!query.trim()) return;
        setLoading(true);
        setError(null);

        const vendorSummary = VENDORS.map(v =>
          `[ID:${v.id}] ${v.name} | ${v.category} | ${v.subcategory} | ${v.description} | Tags: ${v.tags.join(", ")} | Price: ${v.priceRange} | Family-friendly: ${v.familyFriendly}`
        ).join("\n");

        try {
          const response = await fetch(PROXY_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query, vendorSummary, lang }),
          });

          if (response.status === 429) {
            const fb = keywordFallback(query);
            setResults({
              vendors: fb.vendors.length > 0 ? fb.vendors : VENDORS.slice(0, 6),
              message: t.rateLimit,
            });
            setCategoryFilter("All");
            return;
          }

          const data = await response.json();
          const text = data.text || "";

          const start = text.indexOf("{");
          const end = text.lastIndexOf("}");
          if (start === -1 || end === -1) throw new Error("No JSON object in response");
          const parsed = JSON.parse(text.slice(start, end + 1));

          const ids = Array.isArray(parsed.ids) ? parsed.ids : [];
          const matched = ids.map(id => VENDORS.find(v => v.id === id)).filter(Boolean);

          if (matched.length === 0 && !parsed.message) {
            const fb = keywordFallback(query);
            if (fb.vendors.length > 0) {
              setResults({ vendors: fb.vendors, message: fallbackMsg(fb.stateKey) });
              setCategoryFilter("All");
              return;
            }
          }

          setResults({ vendors: matched, message: parsed.message || "" });
          setCategoryFilter("All");
        } catch (err) {
          console.error(err);
          const fb = keywordFallback(query);
          if (fb.vendors.length > 0) {
            setResults({ vendors: fb.vendors, message: t.fallbackBusy });
            setCategoryFilter("All");
          } else {
            setError(t.errorNoMatch);
          }
        } finally {
          setLoading(false);
        }
      }

      function handleSuggestion(s) {
        setQuery(s);
        setResults(null);
        setTimeout(() => { const el = inputRef.current; if (el) el.focus(); }, 50);
      }

      function handleClear() {
        setQuery("");
        setResults(null);
        setError(null);
      }

      const displayVendors = results ? results.vendors : filteredVendors;

      return (
        <div style={{ minHeight: "100vh", background: "linear-gradient(180deg, #12121f 0%, #1a1a2e 30%, #16162a 100%)", color: "#f0ebe3", fontFamily: "'Inter', -apple-system, BlinkMacSystemFont, sans-serif", maxWidth: 480, margin: "0 auto", padding: "0 16px 32px" }}>
          <LanguageToggle lang={lang} onSelect={setLang} />

          <div style={{ paddingTop: 16, paddingBottom: 16, textAlign: "center" }}>
            <div style={{ fontSize: 13, fontWeight: 600, letterSpacing: "0.15em", color: "#ff6b35", textTransform: "uppercase", marginBottom: 4 }}>NightMarket.fun 2026</div>
            <h1 style={{ fontSize: 26, fontWeight: 800, margin: "4px 0 6px", lineHeight: 1.1, color: "#f0ebe3" }}>{t.title}</h1>
            <p style={{ fontSize: 14, color: "#f0ebe3", opacity: 0.5, margin: 0 }}>{t.subtitle}</p>
          </div>

          <div style={{ position: "relative", marginBottom: 16 }}>
            <input ref={inputRef} type="text" value={query}
              onChange={e => { setQuery(e.target.value); if (results) setResults(null); }}
              onKeyDown={e => e.key === "Enter" && handleSearch()}
              placeholder={t.placeholder}
              style={{ width: "100%", padding: "14px 90px 14px 16px", borderRadius: 12, border: "1px solid #333350", background: "#1e1e30", color: "#f0ebe3", fontSize: 15, outline: "none", boxSizing: "border-box" }} />
            <div style={{ position: "absolute", right: 6, top: "50%", transform: "translateY(-50%)", display: "flex", gap: 4 }}>
              {query && (
                <button onClick={handleClear} style={{ padding: "8px 10px", borderRadius: 8, border: "none", background: "transparent", color: "#f0ebe3", opacity: 0.4, fontSize: 14, cursor: "pointer" }}>✕</button>
              )}
              <button onClick={handleSearch} disabled={loading || !query.trim()} style={{ padding: "8px 16px", borderRadius: 8, border: "none", background: loading ? "#333350" : "#ff6b35", color: "#fff", fontSize: 14, fontWeight: 600, cursor: loading ? "default" : "pointer", opacity: !query.trim() ? 0.4 : 1 }}>
                {loading ? "..." : t.go}
              </button>
            </div>
          </div>

          {!results && !loading && (
            <div style={{ marginBottom: 20 }}>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {t.suggested.map(s => (
                  <button key={s} onClick={() => handleSuggestion(s)} style={{ padding: "6px 12px", borderRadius: 20, border: "1px solid #333350", background: "transparent", color: "#f0ebe3", opacity: 0.6, fontSize: 12, cursor: "pointer", whiteSpace: "nowrap" }}>{s}</button>
                ))}
              </div>
            </div>
          )}

          {results?.message && (
            <div style={{ background: "linear-gradient(135deg, #ff6b3515, #9b59b615)", border: "1px solid #333350", borderRadius: 12, padding: 14, marginBottom: 16, fontSize: 14, lineHeight: 1.5, color: "#f0ebe3", opacity: 0.9 }}>{results.message}</div>
          )}

          {error && (
            <div style={{ background: "#ff6b3520", border: "1px solid #ff6b3550", borderRadius: 12, padding: 14, marginBottom: 16, fontSize: 14, color: "#ff6b35" }}>{error}</div>
          )}

          {loading && (
            <div style={{ textAlign: "center", padding: "40px 0", color: "#f0ebe3", opacity: 0.5 }}>
              <div style={{ fontSize: 24, marginBottom: 8 }}>🏮</div>
              <div style={{ fontSize: 14 }}>{t.loading}</div>
            </div>
          )}

          {!results && !loading && (
            <div style={{ marginBottom: 16 }}><CategoryFilter selected={categoryFilter} onSelect={setCategoryFilter} t={t} /></div>
          )}

          {!loading && (
            <div style={{ fontSize: 12, color: "#f0ebe3", opacity: 0.4, marginBottom: 12 }}>
              {results ? t.resultsFor(displayVendors.length, query) : t.listings(displayVendors.length)}
            </div>
          )}

          {!loading && displayVendors.map(v => <VendorCard key={v.id} vendor={v} freeLabel={t.free} lang={lang} />)}

          {results && !loading && (
            <button onClick={handleClear} style={{ display: "block", width: "100%", padding: 14, marginTop: 8, borderRadius: 12, border: "1px solid #333350", background: "transparent", color: "#f0ebe3", opacity: 0.6, fontSize: 14, cursor: "pointer", textAlign: "center" }}>{t.browseAll}</button>
          )}

          <div style={{ textAlign: "center", marginTop: 32, fontSize: 11, color: "#f0ebe3", opacity: 0.25 }}>{t.footer}</div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<NMFDiscover />);
  </script>
</body>
</html>
